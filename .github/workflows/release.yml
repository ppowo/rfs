name: release

# Manual release: Actions tab -> release workflow -> Run workflow -> main.
# Each run creates a git tag named with the build time, encoded as a
# semver-shaped timestamp (UTC YYYY.MD.HMS: MD = month·100+day, HMS =
# HH·10000+MM·100+SS, none zero-padded) so GoReleaser accepts it, and publishes
# a GitHub Release versioned by that timestamp — so a newer release is always
# a later timestamp. Self-update compares those field-by-field.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe and tagging work

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Compute build version
        id: ver
        run: |
          # Version is the build run time in UTC, encoded as a semver-shaped
          # tag YYYY.MD.HMS (MAJOR.MINOR.PATCH): MD = month·100+day and
          # HMS = HH·10000+MM·100+SS, neither zero-padded, so the tag is valid
          # semver (GoReleaser requires it — see
          # https://goreleaser.com/resources/limitations/semver) while staying
          # a strictly-increasing, dot-separated timestamp the self-update gate
          # compares field-by-field (per ADR 0004). Ex: 2026-07-09 20:01:11 ->
          # 2026.709.200111. Using the run time (not commit time) means the
          # version reflects when you shipped and is newer than any prior release.
          read -r Y Mo D H Mi S <<<"$(date -u +'%Y %m %d %H %M %S')"
          MD=$((10#$Mo * 100 + 10#$D))
          HMS=$((10#$H * 10000 + 10#$Mi * 100 + 10#$S))
          VERSION="$Y.$MD.$HMS"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      # Guard: refuse to release if the computed version is not valid semver
      # (MAJOR.MINOR.PATCH, no leading zeros). GoReleaser rejects anything else
      # at "parsing tag"; catching it here fails fast with a clear message
      # instead of pushing an orphan tag and failing later in goreleaser.
      - name: Validate version is semver
        run: |
          v="${{ steps.ver.outputs.version }}"
          if ! printf '%s' "$v" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "::error::Version '$v' is not valid semver MAJOR.MINOR.PATCH (no leading zeros). GoReleaser requires semver tags; see https://goreleaser.com/resources/limitations/semver"
            exit 1
          fi

      # Guard: refuse to release if main is dirty or ahead of its remote
      # tracking branch — the workflow only ever releases what is actually
      # pushed to origin/main.
      - name: Verify main is pushed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty; commit and push before releasing."
            exit 1
          fi
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse @{u})
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::main is ahead of or behind origin/main; push first."
            exit 1
          fi

      # Guard: refuse if this version already has a release (prevents
      # duplicates from a re-run in the same second).
      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.ver.outputs.version }} already exists. Wait a second and re-run."
            exit 1
          fi

      # goreleaser's release mode requires a git tag at HEAD (it derives
      # .Version from it and validates the tag matches HEAD). So create the
      # time-based tag here and push it; goreleaser then publishes the Release.
      - name: Create version tag
        run: |
          git tag "${{ steps.ver.outputs.version }}" @
          git push origin "${{ steps.ver.outputs.version }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
