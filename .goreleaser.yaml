version: 2

# rfs self-update (ADR 0004) downloads and verifies the exact artifacts this
# config produces: archives named rfs_<version>_<os>_<arch>.tar.gz and a
# sha256 checksums.txt listing them. Keep these names stable — the self-update
# tick parses checksums.txt and selects the archive matching runtime.GOOS /
# runtime.GOARCH.

builds:
  - id: rfs
    main: ./cmd/rfs
    binary: rfs
    # modernc.org/sqlite is pure Go, so CGO_ENABLED=0 yields static,
    # portable binaries that run on any Linux without a C toolchain.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # Build metadata injected into cmd/rfs/version.go via -ldflags -X.
    # version is the release timestamp (YYYY.MM.DD.HHMMSS) the self-update gate
    # compares; commit/commitDate/buildDate are the verbose build info printed
    # by `rfs -version`. Go version, OS, and arch come from the runtime, so
    # they are not injected here.
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.commitDate={{ .CommitDate }}
      - -X main.buildDate={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  # Published (not draft) so the GitHub releases API lists it and the
  # self-update tick can download assets. Triggered manually from the Actions
  # tab (workflow_dispatch); the workflow creates the time-based tag.
  draft: false
