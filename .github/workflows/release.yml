name: release

# Manual release: Actions tab -> release workflow -> Run workflow -> main.
# Each run creates a git tag named with the build time (UTC YYYY.MM.DD.HHMMSS)
# and publishes a GitHub Release for it, versioned by that timestamp — so a
# newer release is always a later timestamp. Self-update compares those.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe and tagging work

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Compute build version
        id: ver
        run: |
          # Version is the build run time in UTC, formatted YYYY.MM.DD.HHMMSS.
          # Using the run time (not commit time) means the version reflects
          # when you shipped, and is strictly newer than any prior release.
          VERSION="$(date -u +%Y.%m.%d.%H%M%S)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      # Guard: refuse to release if main is dirty or ahead of its remote
      # tracking branch — the workflow only ever releases what is actually
      # pushed to origin/main.
      - name: Verify main is pushed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty; commit and push before releasing."
            exit 1
          fi
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse @{u})
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::main is ahead of or behind origin/main; push first."
            exit 1
          fi

      # Guard: refuse if this version already has a release (prevents
      # duplicates from a re-run in the same second).
      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.ver.outputs.version }} already exists. Wait a second and re-run."
            exit 1
          fi

      # goreleaser's release mode requires a git tag at HEAD (it derives
      # .Version from it and validates the tag matches HEAD). So create the
      # time-based tag here and push it; goreleaser then publishes the Release.
      - name: Create version tag
        run: |
          git tag "${{ steps.ver.outputs.version }}" @
          git push origin "${{ steps.ver.outputs.version }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
